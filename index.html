// ======================== 快捷问题列表 ========================
const quickQuestions = [
  "新增买方代码",
  "限额申请",
  "出运申报",
  "收汇确认",
  "保单查询",
  "费用管理",
  "批单回签",
  "限额倒签",
  "短信提醒",
  "反洗钱",
  "查不到记录",
  "申报变更"
];

// ======================== DOM 引用 ========================
const chatContainer = document.getElementById('chatContainer');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const quickContainer = document.getElementById('quickQuestions');

// 渲染快捷问题
quickQuestions.forEach(text => {
  const btn = document.createElement('button');
  btn.textContent = text;
  btn.addEventListener('click', () => handleUserMessage(text));
  quickContainer.appendChild(btn);
});

// ======================== 添加消息 ========================
function addMessage(type, html) {
  const div = document.createElement('div');
  div.className = `message ${type}`;
  div.innerHTML = html;
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  chatContainer.appendChild(div);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

// ======================== 构建回答HTML ========================
function buildAnswerHTML(faq) {
  let html = `<div class="answer-title">${faq.title}</div>`;

  faq.sections.forEach(s => {
    if (s.type === 'text') {
      html += `<div>${s.content}</div>`;
    } else if (s.type === 'subtitle') {
      html += `<div class="section-title">${s.content}</div>`;
    } else if (s.type === 'warning') {
      html += `<div class="warning">${s.content}</div>`;
    } else if (s.type === 'bullet') {
      html += '<ul>';
      s.items.forEach(item => { html += `<li>${item}</li>`; });
      html += '</ul>';
    } else if (s.type === 'ordered') {
      html += '<ol>';
      s.items.forEach(item => { html += `<li>${item}</li>`; });
      html += '</ol>';
    } else if (s.type === 'link') {
      html += `<div style="margin-top:8px"><a class="link" href="${s.url}" target="_blank" rel="noopener">${s.content}</a></div>`;
    }
  });

  return html;
}

// ======================== 匹配 FAQ ========================
function matchFAQ(query) {
  if (!query || !query.trim()) return null;

  // 计算每个 FAQ 的匹配分数
  let best = null;
  let bestScore = 0;

  faqs.forEach((faq, index) => {
    let score = 0;
    faq.keywords.forEach(kw => {
      if (query.includes(kw)) {
        // 完整关键词匹配权重高
        score += kw.length * 3;
      }
      // 部分匹配
      if (kw.includes(query) || query.includes(kw)) {
        score += kw.length;
      }
    });
    if (score > bestScore) {
      bestScore = score;
      best = faq;
    }
  });

  // 阈值：至少得分 > 0 才匹配
  return bestScore > 2 ? best : null;
}

// ======================== 处理用户消息 ========================
function handleUserMessage(text) {
  if (!text || !text.trim()) return;

  const query = text.trim();

  // 显示用户消息
  addMessage('user', query);
  userInput.value = '';

  // 显示打字中
  showTyping();

  // 模拟延迟（让交互更自然）
  setTimeout(() => {
    hideTyping();

    const matched = matchFAQ(query);
    if (matched) {
      addMessage('bot', buildAnswerHTML(matched));
    } else {
      addMessage('bot', '<div class="no-match">抱歉，暂未找到匹配的FAQ解答，请联系人工客服。</div>');
    }
  }, 500);
}

// ======================== 事件绑定 ========================
sendBtn.addEventListener('click', () => {
  handleUserMessage(userInput.value);
});

userInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    handleUserMessage(userInput.value);
  }
});
